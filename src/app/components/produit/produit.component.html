<div class="produit-container">
  <h2>Liste des Produits</h2>

  <div *ngIf="loading" class="loading">
    Chargement des produits...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <table *ngIf="!loading && produits.length > 0" class="produits-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Prix</th>
        <th>Quantité</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let produit of produits">
        <td>{{ produit.id }}</td>
        <td>{{ produit.nom }}</td>
        <td>{{ produit.prix }}</td>
        <td>{{ produit.quantite }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && produits.length === 0" class="no-data">
    Aucun produit trouvé
  </div>
</div>
