<div class="auth-page"> 
  <div class="auth-card"> 
    <div class="auth-header"> 
      <div class="auth-logo"><svg lucideLogIn aria-hidden="true"></svg></div>
      <h1>Connexion</h1> 
      <p>Redirection vers Keycloak...</p> 
    </div> 
  
    <div class="auth-form"> 
      @if (error()) { 
        <div class="alert alert-error">{{ error() }}</div> 
      } 

      <button type="button" class="btn btn-primary" [disabled]="loading()"> 
        <span class="spinner"></span> Redirection...
      </button> 
    </div> 
  </div> 
</div>
