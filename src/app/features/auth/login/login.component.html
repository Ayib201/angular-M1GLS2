<div class="auth-page"> 
  <div class="auth-card"> 
    <div class="auth-header"> 
      <div class="auth-logo">👤</div> 
      <h1>Connexion</h1> 
      <p>Bienvenue ! Connectez-vous à votre compte.</p> 
    </div> 
  
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form"> 
      @if (error()) { 
        <div class="alert alert-error">{{ error() }}</div> 
      } 
      <div class="form-group"> 
        <label>Email</label> 
        <input type="email" formControlName="email" 
placeholder="vous@exemple.com" 
          [class.invalid]="isInvalid('email')" /> 
        @if (isInvalid('email')) { 
          <span class="field-error">Email invalide</span> 
        } 
      </div> 
      <div class="form-group"> 
        <label>Mot de passe</label> 
        <div class="input-with-toggle"> 
          <input [type]="showPwd() ? 'text' : 'password'" 
formControlName="password" 
            placeholder="••••••••" [class.invalid]="isInvalid('password')" /> 
          <button type="button" class="pwd-toggle" 
(click)="showPwd.set(!showPwd())"> 
            {{ showPwd() ? '🙈' : '👁' }} 
          </button> 
        </div> 
        @if (isInvalid('password')) { 
          <span class="field-error">Mot de passe requis (min 6 caractères)</span>
           } 
      </div> 
      <button type="submit" class="btn btn-primary" [disabled]="loading()"> 
        @if (loading()) { <span class="spinner"></span> Connexion... } 
        @else { Se connecter } 
      </button> 
    </form> 
  
    <p class="auth-footer"> 
      Pas encore de compte ? <a routerLink="/auth/register">S'inscrire</a> 
    </p> 
  </div> 
</div>
